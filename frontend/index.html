<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MsdChords | AI Audio Studio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <i class="fa-solid fa-music neon-text"></i>
                <h1>MsdChords</h1>
            </div>
            <div class="header-actions">
                <div class="yt-container">
                    <i class="fa-brands fa-youtube" style="color: #ff0000; font-size: 1.2rem;"></i>
                    <input type="text" id="yt-input" placeholder="Paste YouTube Link...">
                    <button id="yt-btn" class="btn primary-btn" style="padding: 0.5rem 1rem;"><i class="fa-solid fa-arrow-right"></i></button>
                </div>
                <label for="audio-upload" class="btn primary-btn" style="background: rgba(255,255,255,0.1); color: white; box-shadow: none;">
                    <i class="fa-solid fa-upload"></i> Local File
                </label>
                <input type="file" id="audio-upload" accept="audio/*" style="display: none;">
            </div>
        </header>

        <main class="layout-main">
            <aside class="history-sidebar glass">
                <h3><i class="fa-solid fa-clock-rotate-left"></i> History</h3>
                <div id="history-list" class="history-list">
                    <!-- History items will be populated here -->
                </div>
            </aside>
            <div class="content-area">
            <div class="status-panel glass" id="status-panel">
                <div class="status-icon" id="status-icon">
                    <i class="fa-solid fa-wave-square"></i>
                </div>
                <div class="status-text" id="status-text">
                    <h2>Ready to Separate</h2>
                    <p>Upload a song to isolate vocals, drums, bass, guitar, piano, and other.</p>
                </div>
            </div>

            <div class="mixer-panel glass hidden" id="mixer-panel">
                <div class="master-controls">
                    <button class="play-btn" id="master-play"><i class="fa-solid fa-play"></i></button>
                    <div class="progress-container">
                        <span id="time-current">0:00</span>
                        <input type="range" id="master-progress" min="0" max="100" value="0" step="0.1">
                        <span id="time-total">0:00</span>
                    </div>
                    
                    <div class="global-fx-controls">
                        <div class="fx-box">
                            <span class="fx-label">SPEED</span>
                            <div class="fx-buttons">
                                <button class="fx-btn" id="speed-down"><i class="fa-solid fa-minus"></i></button>
                                <input type="text" class="fx-value" id="speed-val" value="1.00x">
                                <button class="fx-btn" id="speed-up"><i class="fa-solid fa-plus"></i></button>
                            </div>
                        </div>
                        <div class="fx-box">
                            <span class="fx-label">PITCH</span>
                            <div class="fx-buttons">
                                <button class="fx-btn" id="pitch-down"><i class="fa-solid fa-minus"></i></button>
                                <input type="text" class="fx-value" id="pitch-val" value="0.00">
                                <button class="fx-btn" id="pitch-up"><i class="fa-solid fa-plus"></i></button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="stems-container" id="stems-container">
                    <!-- Stems will be generated here by JS -->
                </div>
            </div>
            </div>
        </main>

        <div class="developer-footer">
            Made by MustTheDuck 
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
